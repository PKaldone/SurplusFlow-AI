services:
  postgres:
    image: postgres:16-alpine
    container_name: sf-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-surplusflow}
      POSTGRES_USER: ${POSTGRES_USER:-sfuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sfpass_local_dev}
    ports:
      - "${POSTGRES_PORT:-3102}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sfuser -d surplusflow"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sf-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-sfredis_local_dev}
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "sfredis_local_dev", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: sf-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-sfminio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-sfminio_secret_local}
    ports:
      - "${MINIO_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set sfminio http://minio:9000 sfminio sfminio_secret_local;
      mc mb --ignore-existing sfminio/surplusflow-documents;
      mc mb --ignore-existing sfminio/surplusflow-sensitive;
      mc mb --ignore-existing sfminio/surplusflow-generated;
      mc anonymous set none sfminio/surplusflow-documents;
      mc anonymous set none sfminio/surplusflow-sensitive;
      mc anonymous set none sfminio/surplusflow-generated;
      echo 'Buckets created';
      "

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: sf-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://${POSTGRES_USER:-sfuser}:${POSTGRES_PASSWORD:-sfpass_local_dev}@postgres:5432/${POSTGRES_DB:-surplusflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-sfredis_local_dev}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY:-sfminio}
      S3_SECRET_KEY: ${MINIO_SECRET_KEY:-sfminio_secret_local}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-MUST-BE-32-chars!}
      MAGIC_LINK_SECRET: ${MAGIC_LINK_SECRET:-dev-magic-link-secret-change-me!}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-32-characters!}
      SSN_ENCRYPTION_KEY: ${SSN_ENCRYPTION_KEY:-dev-ssn-key-32-characters-long!!}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002}
      APP_URL: ${APP_URL:-http://localhost:3000}
      PORTAL_URL: ${PORTAL_URL:-http://localhost:3002}
    ports:
      - "${API_PORT:-3201}:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../../
      dockerfile: apps/worker/Dockerfile
    container_name: sf-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-sfuser}:${POSTGRES_PASSWORD:-sfpass_local_dev}@postgres:5432/${POSTGRES_DB:-surplusflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-sfredis_local_dev}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY:-sfminio}
      S3_SECRET_KEY: ${MINIO_SECRET_KEY:-sfminio_secret_local}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-32-characters!}
    restart: unless-stopped

  admin-web:
    build:
      context: ../../
      dockerfile: apps/admin-web/Dockerfile
    container_name: sf-admin
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    ports:
      - "${ADMIN_PORT:-3100}:3000"
    restart: unless-stopped

  portal-web:
    build:
      context: ../../
      dockerfile: apps/portal-web/Dockerfile
    container_name: sf-portal
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3002"
    ports:
      - "${PORTAL_PORT:-3101}:3002"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
